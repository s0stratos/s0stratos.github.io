"Ubi Clītiphō hīc est. eccum mē inque. eccum hīc tibi.",

"quīn accipis. cedo sānē. sequere hāc mē ōcius.",
"tū hīc nōs dum exīmus intereā opperībere.",
"nam nīl est illīc quod morēmur diūtius.",
"minās quidem iam decem habet ā mē fīlia",
"quās hortāmentīs esse nunc dūcō datās.",
"hāsce ōrnāmentīs cōnsequentur alterae.",
"porrō haec talenta dōtis apposcunt duo.",
"quam multa iniūsta ac prāua fīunt mōribus.",

"Heaut. 940 (tr7) | duo talenta prō rē nostrā ego esse dēcrēuī satis.",
"sed ita dictū opus est sī mē uīs saluum esse et rem et fīlium",
"mē mea omnia bona dōtī dīxisse illī. quam rem agis.",
"id mīrārī tē simulātō et illum hoc rogitātō simul",
"quam ob rem id faciam. quīn ego uērō quam ob rem id faciās nesciō.",
"egone. ut eius animum quī nunc luxuriā et lascīuiā",
"diffluit retundam redigam ut quō sē uortat nesciat.",
"quid agis. mitte: sine mē in hāc rē gerere mihi mōrem. sinō:",
"itane uīs. ita. fīat. ac iam uxōrem ut accersat paret.",
"hīc ita ut līberōs est aequum dictīs cōnfūtābitur.",
"sed Surum quidem egone sī uīuō adeō exōrnātum dabō",
"adeō dēpexum ut dum uīuat meminerit semper meī.",
"quī sibi mē prō dērīdiculō ac dēlectāmentō putat.",
"nōn ita mē di ament audēret facere haec uiduae mulierī",
"quae in mē fēcit. Itane tandem quaesō Menedēme. ut pater",
"tam in breuī spatiō omnem dē mē ēiēcerīt animum patris.",
"quodnam ob facinus. quid ego tantum sceleris admīsī miser.",
"uulgō faciunt. scio tibi esse hoc grauius multō ac dūrius",
"cui fit. uērum ego haud minus aegrē patior id quī nesciō",
"nec ratiōnem capiō nisi quod tibi bene ex animō uolō.",
"hīc patrem astāre aibās. eccum. quid mē incūsās Clītiphō.",
"quidquid ego huius fēcī tibi prōspexī et stultitiae tuae.",
"ubi tē uīdī animō esse omissō et suāuia in praesentiā",
"quae essent prīma habēre neque cōnsulere in longitūdinem:",
"cēpī ratiōnem ut neque egērēs neque ut haec possēs perdere.",
"ubi cui decuit prīmō tibi nōn licuit per tē mihi dare",
"abiī ad proximum tibi qui erat. eī commīsī et crēdidī:",
"ibi tuae stultitiae semper erit praesidium Clītiphō",
"uīctus uestītus quō in tēctum tē receptēs. ei mihi.",
"satius est quam tē ipsō hērēde haec possidēre Bacchidem.",
"disperiī: scelestus quantās turbās concīuī īnsciēns.",
"ēmorī cupiō. prius quaesō disce quid sit uīuere.",
"ubi sciēs sī displicēbit uīta tum istōc ūtitor.",

"quaeue āmentiast quod peccāuī ego id obesse huic. īlicet.",
"nē tē admiscē: nēmō accūsat Sure tē: nec tū āram tibi",
"nec precātōrem parārīs. quid agis. nīl suscēnseō",
"neque tibī nec tibi. nec uōs est aequum quod faciō mihi.",

"[quae mea causa fēcit]. [CREMĒS] fīat. [CANTOR] uōs ualēte (et plaudite).",
    ];

    function escapeThen(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function colorizeSyntax(text) {
      let escaped = escapeThen(text);
      escaped = escaped
        .replace(/\[/g, '<span class="bracket">[</span>')
        .replace(/\]/g, '<span class="bracket">]</span>')
        .replace(/\(/g, '<span class="paren">(</span>')
        .replace(/\)/g, '<span class="paren">)</span>')
        .replace(/\{/g, '<span class="curly">{</span>')
        .replace(/\}/g, '<span class="curly">}</span>')
        .replace(/~/g, '<span style="color:#8a008a">~</span>')
        .replace(/_/g, '<span style="color:#8a008a">_</span>')
        .replace(/\*([^*]+)\*/g, '<span class="star">*$1*</span>');
      return escaped;
    }

    function colorizeMeter(text) {
      let escaped = escapeThen(text);
      escaped = escaped
        .replace(/\(([^)]+)\)/g, '<span class="paren2">($1)</span>')
        .replace(/\{([^}]+)\}/g, '<span class="curly2">{$1}</span>')
        .replace(/#/g, '<span style="color:#8a008a">#</span>')
        .replace(/\|\|/g, '<span style="color:#8a008a">||</span>')
        .replace(/\*([^*]+)\*/g, '<span class="star">*$1*</span>');
      return escaped;
    }

    let activeIndex = -1;

    function buildLines(containerId, lines, isText2) {
      const container = document.getElementById(containerId);
      lines.forEach((text, i) => {
        const row = document.createElement('div');
        row.className = 'line-row';
        row.dataset.index = i;

        const num = document.createElement('div');
        num.className = 'line-num';
        num.textContent = i + 1;

        const content = document.createElement('div');
        content.className = 'line-text';

        if (isText2) {
          content.innerHTML = colorizeSyntax(text);
        } else {
          content.innerHTML = colorizeMeter(text);
        }

        row.appendChild(num);
        row.appendChild(content);
        row.addEventListener('click', () => selectLine(i));
        container.appendChild(row);
      });
    }

    function getRows(scrollId) {
      return Array.from(document.getElementById(scrollId).querySelectorAll('.line-row'));
    }

    function scrollToIndex(scrollId, index, smooth) {
      const container = document.getElementById(scrollId);
      const rows = getRows(scrollId);
      const row = rows[index];
      if (!row) return;
      const target = row.offsetTop - container.clientHeight / 2 + row.clientHeight / 2;
      container.scrollTo({ top: Math.max(0, target), behavior: smooth ? 'smooth' : 'instant' });
    }

    function selectLine(index) {
      activeIndex = index;
      ['scroll1', 'scroll2'].forEach(id => {
        getRows(id).forEach((row, i) => row.classList.toggle('active', i === index));
      });
      const indicator = document.getElementById('syncIndicator');
      document.getElementById('syncNum').textContent = index + 1;
      indicator.classList.add('show');
      clearTimeout(indicator._timeout);
      indicator._timeout = setTimeout(() => indicator.classList.remove('show'), 1500);
      if (document.getElementById('syncScroll').checked) {
        scrollToIndex('scroll1', index, true);
        scrollToIndex('scroll2', index, true);
      }
    }

    /* Row-based sync: find topmost visible row index in source, align target to same index */
    function getTopVisibleIndex(scrollId) {
      const container = document.getElementById(scrollId);
      const rows = getRows(scrollId);
      const top = container.scrollTop;
      for (let i = rows.length - 1; i >= 0; i--) {
        if (rows[i].offsetTop <= top + 2) return i;
      }
      return 0;
    }

    let syncLock = false;

    function bindSync(sourceId, targetId) {
      const source = document.getElementById(sourceId);
      source.addEventListener('scroll', () => {
        if (!document.getElementById('syncScroll').checked) return;
        if (syncLock) return;
        syncLock = true;
        const idx = getTopVisibleIndex(sourceId);
        const target = document.getElementById(targetId);
        const rows = getRows(targetId);
        if (rows[idx]) target.scrollTop = rows[idx].offsetTop;
        requestAnimationFrame(() => { syncLock = false; });
      });
    }

    document.getElementById('highlightSyntax').addEventListener('change', function() {
      const container = document.getElementById('scroll2');
      container.querySelectorAll('.line-text').forEach((el, i) => {
        if (this.checked) { el.innerHTML = colorizeSyntax(lines2[i]); }
        else { el.textContent = lines2[i]; }
      });
    });

    buildLines('scroll1', lines1, false);
    buildLines('scroll2', lines2, true);

    bindSync('scroll1', 'scroll2');
    bindSync('scroll2', 'scroll1');

    selectLine(0);
</script>
