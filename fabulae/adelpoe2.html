        .controls {

          border-bottom: 1px solid #d4cfc4;
          padding: 0.6rem 2rem;
          display: flex;
          align-items: center;
          gap: 1.5rem;
          font-size: 0.82rem;
          color: #555;
        }

        .controls label { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; }
        .controls input[type=checkbox] { cursor: pointer; }

        .legend {
          margin-left: auto;
          display: flex;
          align-items: center;
          gap: 1rem;
          font-size: 0.78rem;
          color: #777;
        }

        .legend-item { display: flex; align-items: center; gap: 0.35rem; }
        .legend-dot {
          width: 10px; height: 10px; border-radius: 50%;
        }

        .container {
          display: grid;
          grid-template-columns: 1fr 1fr;
          height: calc(100vh - 90px);
          overflow: hidden;
        }

        .panel {
          display: flex;
          flex-direction: column;
          overflow: hidden;
          border-right: 1px solid #d4cfc4;
        }

        .panel:last-child { border-right: none; }

        .panel-header {
          background: #2c2a24;
          color: #c8c0a8;
          padding: 0.5rem 1.2rem;
          font-size: 0.75rem;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          display: flex;
          align-items: center;
          justify-content: space-between;
          flex-shrink: 0;
        }

        .panel-header .badge {
          background: #4a4538;
          color: #9a9080;
          padding: 2px 8px;
          border-radius: 3px;
          font-size: 0.7rem;
          letter-spacing: 0.05em;
        }

        .lines-wrapper {
          overflow-y: auto;
          flex: 1;
          scroll-behavior: smooth;
        }

        .line-row {
          display: flex;
          align-items: stretch;
          border-bottom: 1px solid #e8e4da;
          cursor: pointer;
          transition: background 0.15s;
        }

        .line-row:hover { background: #f0ece2; }

        .line-row.active {
          background: #fdf3dc;
          border-left: 3px solid #c8960a;
        }

        .line-num {
          width: 42px;
          flex-shrink: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 0.72rem;
          color: #aaa;
          font-family: monospace;
          background: #f2efe6;
          border-right: 1px solid #e2ddd4;
          user-select: none;
        }

        .line-row.active .line-num {
          background: #f5e8b0;
          color: #8a6800;
          border-right-color: #d4b830;
        }

        .line-text {
          padding: 0.45rem 1rem;
          font-size: 0.88rem;
          line-height: 1.6;
          font-family: 'Georgia', serif;
          flex: 1;
          white-space: pre-wrap;
          word-break: break-word;
        }

        /* Text 1 specific styling */
        #panel1 .line-text { color: #1a1a2e; }

        /* Text 2 specific styling */
        #panel2 .line-text { color: #1a2e1a; }

        /* Scrollbar styling */
        .lines-wrapper::-webkit-scrollbar { width: 6px; }
        .lines-wrapper::-webkit-scrollbar-track { background: #f0ece2; }
        .lines-wrapper::-webkit-scrollbar-thumb { background: #c8c0a8; border-radius: 3px; }

        /* Highlight special chars in text 2 */
        .bracket { color: #1a6e1a; font-weight: bolder; }
        .curly { color: #8a4000; font-weight: bolder; }
        .paren { color: #1a1a8e; font-weight: bolder; }
        .tilde { color: #8a008a; font-weight: bolder; }
        .star { color: #8a0000; font: italic; }

        .sync-indicator {
          position: fixed;
          bottom: 1rem;
          left: 50%;
          transform: translateX(-50%);
          background: #2c2a24;
          color: #e8e4d8;
          padding: 0.4rem 1rem;
          border-radius: 20px;
          font-size: 0.75rem;
          opacity: 0;
          transition: opacity 0.3s;
          pointer-events: none;
          z-index: 100;
        }

        .sync-indicator.show { opacity: 1; }

        @media (max-width: 700px) {
          .container { grid-template-columns: 1fr; height: auto; }
          .panel { height: 50vh; }
          .controls .legend { display: none; }
        }
    </style>
</head>

    function escapeThen(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function colorizeSyntax(text) {
      let escaped = escapeThen(text);
      escaped = escaped
        .replace(/\[/g, '<span class="bracket">[</span>')
        .replace(/\]/g, '<span class="bracket">]</span>')
        .replace(/\(/g, '<span class="paren">(</span>')
        .replace(/\)/g, '<span class="paren">)</span>')
        .replace(/\{/g, '<span class="curly">{</span>')
        .replace(/\}/g, '<span class="curly">}</span>')
        .replace(/~/g, '<span style="color:#8a008a">~</span>')
        .replace(/_/g, '<span style="color:#8a008a">_</span>')
        .replace(/\*([^*]+)\*/g, '<span class="star">*$1*</span>');
      return escaped;
    }

    let activeIndex = -1;

    function buildLines(containerId, lines, isText2) {
      const container = document.getElementById(containerId);
      lines.forEach((text, i) => {
        const row = document.createElement('div');
        row.className = 'line-row';
        row.dataset.index = i;

        const num = document.createElement('div');
        num.className = 'line-num';
        num.textContent = i + 1;

        const content = document.createElement('div');
        content.className = 'line-text';

        if (isText2) {
          content.innerHTML = colorizeSyntax(text);
        } else {
          content.textContent = text;
        }

        row.appendChild(num);
        row.appendChild(content);
        row.addEventListener('click', () => selectLine(i));
        container.appendChild(row);
      });
    }

    function getRows(scrollId) {
      return Array.from(document.getElementById(scrollId).querySelectorAll('.line-row'));
    }

    function scrollToIndex(scrollId, index, smooth) {
      const container = document.getElementById(scrollId);
      const rows = getRows(scrollId);
      const row = rows[index];
      if (!row) return;
      const target = row.offsetTop - container.clientHeight / 2 + row.clientHeight / 2;
      container.scrollTo({ top: Math.max(0, target), behavior: smooth ? 'smooth' : 'instant' });
    }

    function selectLine(index) {
      activeIndex = index;
      ['scroll1', 'scroll2'].forEach(id => {
        getRows(id).forEach((row, i) => row.classList.toggle('active', i === index));
      });
      const indicator = document.getElementById('syncIndicator');
      document.getElementById('syncNum').textContent = index + 1;
      indicator.classList.add('show');
      clearTimeout(indicator._timeout);
      indicator._timeout = setTimeout(() => indicator.classList.remove('show'), 1500);
      if (document.getElementById('syncScroll').checked) {
        scrollToIndex('scroll1', index, true);
        scrollToIndex('scroll2', index, true);
      }
    }

    /* Row-based sync: find topmost visible row index in source, align target to same index */
    function getTopVisibleIndex(scrollId) {
      const container = document.getElementById(scrollId);
      const rows = getRows(scrollId);
      const top = container.scrollTop;
      for (let i = rows.length - 1; i >= 0; i--) {
        if (rows[i].offsetTop <= top + 2) return i;
      }
      return 0;
    }

    let syncLock = false;

    function bindSync(sourceId, targetId) {
      const source = document.getElementById(sourceId);
      source.addEventListener('scroll', () => {
        if (!document.getElementById('syncScroll').checked) return;
        if (syncLock) return;
        syncLock = true;
        const idx = getTopVisibleIndex(sourceId);
        const target = document.getElementById(targetId);
        const rows = getRows(targetId);
        if (rows[idx]) target.scrollTop = rows[idx].offsetTop;
        requestAnimationFrame(() => { syncLock = false; });
      });
    }

    document.getElementById('highlightSyntax').addEventListener('change', function() {
      const container = document.getElementById('scroll2');
      container.querySelectorAll('.line-text').forEach((el, i) => {
        if (this.checked) { el.innerHTML = colorizeSyntax(lines2[i]); }
        else { el.textContent = lines2[i]; }
      });
    });

    buildLines('scroll1', lines1, false);
    buildLines('scroll2', lines2, true);

    bindSync('scroll1', 'scroll2');
    bindSync('scroll2', 'scroll1');

    selectLine(0);
</script>
